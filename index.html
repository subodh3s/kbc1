<!DOCTYPE html>
<html>
<head>
  <title>Premium Tic Tac Toe AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    #status {
      margin: 10px;
      font-size: 20px;
    }

    #board {
      width: 320px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }

    .cell {
      width: 100px;
      height: 100px;
      font-size: 2.5rem;
      background: rgba(255,255,255,0.9);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.3s;
      box-shadow: 0 0 10px #00f7ff;
      animation: pop 0.2s ease;
    }

    .cell:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #ff00ff;
    }

    .win {
      background: #00ff99 !important;
      animation: glow 0.5s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #00ff99; }
      to { box-shadow: 0 0 25px #00ff99; }
    }

    @keyframes pop {
      from { transform: scale(0.5); }
      to { transform: scale(1); }
    }

    button, select {
      padding: 10px 15px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button {
      background: #ff4f91;
      color: white;
    }

    button:hover {
      background: #ff007f;
    }

    select {
      background: white;
      color: black;
    }

    @media (max-width: 500px) {
      #board {
        width: 90%;
      }

      .cell {
        height: 80px;
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<h1>🎮 Tic Tac Toe AI</h1>

<h2 id="status">Your Turn</h2>

<label>Difficulty: </label>
<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard" selected>Hard</option>
</select>

<h3>Player: <span id="pScore">0</span> | AI: <span id="aScore">0</span></h3>

<div id="board"></div>
<button onclick="restart()">Restart</button>

<script>
  const boardElement = document.getElementById("board");
  const statusText = document.getElementById("status");
  const difficultySelect = document.getElementById("difficulty");

  let board = ["", "", "", "", "", "", "", "", ""];
  let human = "X";
  let ai = "O";
  let gameOver = false;

  let pScore = 0;
  let aScore = 0;

  function createBoard() {
    boardElement.innerHTML = "";
    board.forEach((cell, index) => {
      const div = document.createElement("div");
      div.classList.add("cell");
      div.innerText = cell;
      div.addEventListener("click", () => humanMove(index));
      boardElement.appendChild(div);
    });
  }

  function humanMove(index) {
    if (board[index] !== "" || gameOver) return;

    board[index] = human;
    createBoard();

    if (checkWinner(board, human)) {
      statusText.innerText = "🎉 You Win!";
      highlightWin();
      pScore++;
      document.getElementById("pScore").innerText = pScore;
      gameOver = true;
      return;
    }

    if (isDraw()) {
      statusText.innerText = "🤝 Draw!";
      gameOver = true;
      return;
    }

    statusText.innerText = "🤖 AI Thinking...";
    setTimeout(aiMove, 400);
  }

  function aiMove() {
    let difficulty = difficultySelect.value;
    let move;

    if (difficulty === "easy") {
      move = randomMove();
    } else if (difficulty === "medium") {
      move = Math.random() < 0.5 ? randomMove() : bestMove();
    } else {
      move = bestMove();
    }

    board[move] = ai;
    createBoard();

    if (checkWinner(board, ai)) {
      statusText.innerText = "🤖 AI Wins!";
      highlightWin();
      aScore++;
      document.getElementById("aScore").innerText = aScore;
      gameOver = true;
      return;
    }

    if (isDraw()) {
      statusText.innerText = "🤝 Draw!";
      gameOver = true;
      return;
    }

    statusText.innerText = "Your Turn";
  }

  function randomMove() {
    let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
    return empty[Math.floor(Math.random() * empty.length)];
  }

  function bestMove() {
    let bestScore = -Infinity;
    let move;

    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = ai;
        let score = minimax(board, 0, false);
        board[i] = "";
        if (score > bestScore) {
          bestScore = score;
          move = i;
        }
      }
    }
    return move;
  }

  function minimax(newBoard, depth, isMaximizing) {
    if (checkWinner(newBoard, ai)) return 1;
    if (checkWinner(newBoard, human)) return -1;
    if (!newBoard.includes("")) return 0;

    if (isMaximizing) {
      let bestScore = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (newBoard[i] === "") {
          newBoard[i] = ai;
          let score = minimax(newBoard, depth + 1, false);
          newBoard[i] = "";
          bestScore = Math.max(score, bestScore);
        }
      }
      return bestScore;
    } else {
      let bestScore = Infinity;
      for (let i = 0; i < 9; i++) {
        if (newBoard[i] === "") {
          newBoard[i] = human;
          let score = minimax(newBoard, depth + 1, true);
          newBoard[i] = "";
          bestScore = Math.min(score, bestScore);
        }
      }
      return bestScore;
    }
  }

  function checkWinner(b, player) {
    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    for (let combo of wins) {
      if (combo.every(i => b[i] === player)) {
        window.winCombo = combo;
        return true;
      }
    }
    return false;
  }

  function highlightWin() {
    const cells = document.querySelectorAll(".cell");
    winCombo.forEach(i => cells[i].classList.add("win"));
  }

  function isDraw() {
    return board.every(cell => cell !== "");
  }

  function restart() {
    board = ["", "", "", "", "", "", "", "", ""];
    gameOver = false;
    statusText.innerText = "Your Turn";
    createBoard();
  }

  createBoard();
</script>

</body>
</html>
