<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    #board {
      width: 320px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .cell {
      width: 100px;
      height: 100px;
      font-size: 2.5rem;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .cell:hover {
      transform: scale(1.08);
      background: #fff;
    }

    .cell:active {
      transform: scale(0.95);
    }

    button, select {
      padding: 10px 15px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button {
      background: #ff7eb3;
      color: white;
    }

    button:hover {
      background: #ff4f91;
    }

    select {
      background: white;
      color: black;
    }
  </style>
</head>
<body>

<h1>🎮 Tic Tac Toe AI</h1>

<label>Difficulty: </label>
<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard" selected>Hard</option>
</select>

<div id="board"></div>
<button onclick="restart()">Restart</button>

<script>
  const boardElement = document.getElementById("board");
  const difficultySelect = document.getElementById("difficulty");

  let board = ["", "", "", "", "", "", "", "", ""];
  let human = "X";
  let ai = "O";
  let gameOver = false;

  function createBoard() {
    boardElement.innerHTML = "";
    board.forEach((cell, index) => {
      const div = document.createElement("div");
      div.classList.add("cell");
      div.innerText = cell;
      div.addEventListener("click", () => humanMove(index));
      boardElement.appendChild(div);
    });
  }

  function humanMove(index) {
    if (board[index] !== "" || gameOver) return;

    board[index] = human;
    createBoard();

    if (checkWinner(board, human)) {
      setTimeout(() => alert("🎉 You win!"), 100);
      gameOver = true;
      return;
    }

    if (isDraw()) {
      setTimeout(() => alert("🤝 Draw!"), 100);
      gameOver = true;
      return;
    }

    setTimeout(aiMove, 400);
  }

  function aiMove() {
    let difficulty = difficultySelect.value;
    let move;

    if (difficulty === "easy") {
      move = randomMove();
    } 
    else if (difficulty === "medium") {
      move = Math.random() < 0.5 ? randomMove() : bestMove();
    } 
    else {
      move = bestMove(); // hard
    }

    board[move] = ai;
    createBoard();

    if (checkWinner(board, ai)) {
      setTimeout(() => alert("🤖 AI wins!"), 100);
      gameOver = true;
      return;
    }

    if (isDraw()) {
      setTimeout(() => alert("🤝 Draw!"), 100);
      gameOver = true;
    }
  }

  function randomMove() {
    let empty = board
      .map((v, i) => v === "" ? i : null)
      .filter(v => v !== null);

    return empty[Math.floor(Math.random() * empty.length)];
  }

  function bestMove() {
    let bestScore = -Infinity;
    let move;

    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = ai;
        let score = minimax(board, 0, false);
        board[i] = "";
        if (score > bestScore) {
          bestScore = score;
          move = i;
        }
      }
    }
    return move;
  }

  function minimax(newBoard, depth, isMaximizing) {
    if (checkWinner(newBoard, ai)) return 1;
    if (checkWinner(newBoard, human)) return -1;
    if (!newBoard.includes("")) return 0;

    if (isMaximizing) {
      let bestScore = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (newBoard[i] === "") {
          newBoard[i] = ai;
          let score = minimax(newBoard, depth + 1, false);
          newBoard[i] = "";
          bestScore = Math.max(score, bestScore);
        }
      }
      return bestScore;
    } else {
      let bestScore = Infinity;
      for (let i = 0; i < 9; i++) {
        if (newBoard[i] === "") {
          newBoard[i] = human;
          let score = minimax(newBoard, depth + 1, true);
          newBoard[i] = "";
          bestScore = Math.min(score, bestScore);
        }
      }
      return bestScore;
    }
  }

  function checkWinner(b, player) {
    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    return wins.some(combo => combo.every(i => b[i] === player));
  }

  function isDraw() {
    return board.every(cell => cell !== "");
  }

  function restart() {
    board = ["", "", "", "", "", "", "", "", ""];
    gameOver = false;
    createBoard();
  }

  createBoard();
</script>

</body>
</html>
